<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Experiencia 3D</title>

    <link
        rel="stylesheet"
        href="experiencia.css">

    <style>
        #loadingScreen{
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 18px;
            background: #0B081A;
            opacity: 1;
            transition: opacity .5s ease;
        }
        #loadingScreen.hidden{
            opacity: 0;
            pointer-events: none;
        }
        #loadingScreen .loader-spin{
            width: 46px;
            height: 46px;
            border-radius: 50%;
            border: 3px solid rgba(184,177,216,.2);
            border-top-color: #E61F84;
            border-right-color: #C3D104;
            animation: loader-spin .8s linear infinite;
        }
        @keyframes loader-spin{
            to{ transform: rotate(360deg); }
        }
        #loadingScreen span{
            font-family: 'Inter', sans-serif;
            font-size: .8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #B8B1D8;
        }
    </style>

</head>

<body>

    <!-- PANTALLA DE CARGA -->
    <div id="loadingScreen">
        <div class="loader-spin"></div>
        <span>Cargando experiencia…</span>
    </div>

    <!-- GIF DE FONDO -->

    <div class="gif-bg"></div>

    <!-- GRANO TIPO IMPRESIÓN -->

    <div class="noise"></div>

    <!-- CURSOR -->

    <div class="cursor"></div>

    <!-- THREE JS -->

    <button id="resetBtn">
    ↺ RESET
</button> 

<button id="landingBtn">
    ← VOLVER AL LANDING
</button>

<audio
    id="bgMusic"
    autoplay
    loop
    preload="auto">

    <source src="assets/ambiente.mp3" type="audio/mpeg">

</audio>

    <script
        type="module"
        src="experiencia.js">
    </script>

    <script>
        window.addEventListener('load', () => {
            const loadingScreen = document.querySelector('#loadingScreen');
            if (loadingScreen) {
                setTimeout(() => {
                    loadingScreen.classList.add('hidden');
                }, 350);
            }
        });
    </script>

</body>

</html>
